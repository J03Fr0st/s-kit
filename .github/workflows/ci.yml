name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run verification suite
        run: npm test

      - name: Run doctor
        run: npm run doctor

  opencode:
    name: Verify OpenCode plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check version consistency
        run: bash scripts/bump-version.sh --check

      - name: Run OpenCode plugin tests
        run: bash tests/opencode/run-tests.sh
