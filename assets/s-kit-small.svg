    <path d="M166 428h99c92 0 159-54 159-128 0-37-18-70-50-92" stroke="url(#railGradient)" stroke-width="42"/>
    <path d="M158 330c35-55 80-82 135-82 36 0 60-13 77-40" stroke="url(#pathGradient)" stroke-width="48"/>
  </g>

  <circle cx="180" cy="326" r="30" fill="#14B8A6" stroke="#F8FAFC" stroke-width="10"/>
  <circle cx="332" cy="186" r="30" fill="#F59E0B" stroke="#F8FAFC" stroke-width="10"/>
  <circle cx="256" cy="256" r="23" fill="#0F172A" stroke="#F8FAFC" stroke-width="8"/>
